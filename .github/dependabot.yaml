version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(deps)
      include: scope
    labels:
      - dependencies
      - go
    ignore:
      - dependency-name: github.com/davidbyttow/govips

  - package-ecosystem: gomod
    directory: "/src"
    schedule:
      interval: weekly
      day: monday
      time: "03:10"
      timezone: UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(deps)
      include: scope
    labels:
      - dependencies
      - go
