version: 2
jobs:
  build:
    docker:
      - image: cchantep/golang:1.26-vips
    working_directory: /go/src/github.com/cchantep/nuggan

    environment:
      TEST_RESULTS: /tmp/test-results

    steps:
      - checkout

      - run:
          name: Prepare working directories
          command: mkdir -p $TEST_RESULTS

      - restore_cache:
          keys:
            - v1-pkg-cache

      - run:
          name: Check code style
          command: test `gofmt -s -l . | wc -l` -eq 0

      - run:
          name: Build
          command: CC="$PWD/scripts/cc-sse.sh" go build

      - run:
          name: Run tests
          command: |
            trap "go-junit-report <${TEST_RESULTS}/go-test.out > ${TEST_RESULTS}/go-test-report.xml" EXIT
            CC="$PWD/scripts/cc-sse.sh" go test nuggan | tee ${TEST_RESULTS}/go-test.out

      - store_artifacts:
          path: /tmp/test-results
          destination: raw-test-output

      - store_test_results:
          path: /tmp/test-results
